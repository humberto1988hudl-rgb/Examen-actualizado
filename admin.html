<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <title>Reporte Global de Técnicos Evaluados</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --teal: #14b8a6; --dark: #1e293b; --bg: #f8fafc; --danger: #ef4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 40px; display: flex; justify-content: center; }
        .card { background: white; width: 100%; max-width: 1200px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); padding: 30px; border: 1px solid #e2e8f0; }
        .header { display: flex; align-items: center; gap: 10px; margin-bottom: 25px; border-bottom: 2px solid var(--teal); padding-bottom: 15px; }
        .header h2 { margin: 0; color: var(--dark); font-size: 24px; }
        
        .actions { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .btn { border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        
        .btn-excel { background: var(--teal); color: white; }
        .btn-excel:hover { background: #0d9488; }
        
        .btn-reset { background: white; color: var(--danger); border: 1px solid var(--danger); }
        .btn-reset:hover { background: var(--danger); color: white; }

        table { width: 100%; border-collapse: collapse; border-radius: 8px; overflow: hidden; }
        th { background: var(--dark); color: white; padding: 12px; text-align: left; font-size: 12px; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #e2e8f0; color: #334155; font-size: 14px; }
        tr:last-child td { border-bottom: none; }
        .status-badge { background: #f1f5f9; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; color: var(--teal); }
        .score-text { font-weight: bold; color: #0f172a; font-size: 16px; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <span>📊</span>
        <h2>Reporte Global de Técnicos Evaluados</h2>
    </div>

    <div class="actions">
        <button class="btn btn-excel" onclick="exportExcel()">📊 Descargar Todo en Excel</button>
        <button class="btn btn-reset" onclick="resetData()">🗑️ Limpiar Pantalla</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Fecha</th>
                <th>Hora</th>
                <th>ID Empleado</th>
                <th>Nombre del Técnico</th>
                <th style="text-align:center">Correctas</th>
                <th style="text-align:center">Puntaje (0-100)</th>
                <th style="text-align:center">Estatus (%)</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <tr><td colspan="7" style="text-align:center">Cargando datos...</td></tr>
        </tbody>
    </table>
</div>

<script>
const p1 = "ghp_1wl7juso1XZbEys8";
const p2 = "lfuaovonugXpbI0kV0h5";

const GITHUB_CFG = {
    token: p1 + p2,
    repo: "humberto1988hudl-rgb/Examen-actualizado",
    path: "resultados_instrumentacion.json"
};

let rawData = [];
let currentSha = ""; // Necesario para borrar/actualizar en GitHub

async function loadData() {
    const tableBody = document.getElementById('tableBody');
    const url = `https://api.github.com/repos/${GITHUB_CFG.repo}/contents/${GITHUB_CFG.path}?cb=${Date.now()}`;

    try {
        const res = await fetch(url, {
            headers: { "Authorization": `token ${GITHUB_CFG.token}` }
        });
        
        if (!res.ok) throw new Error("Error de conexión");

        const json = await res.json();
        currentSha = json.sha;

        // --- CORRECCIÓN DE CARACTERES (UTF-8) ---
        const binaryString = atob(json.content);
        const bytes = new Uint8Array(binaryString.length);
        for (let i = 0; i < binaryString.length; i++) {
            bytes[i] = binaryString.charCodeAt(i);
        }
        const decodedText = new TextDecoder('utf-8').decode(bytes);
        rawData = JSON.parse(decodedText);
        
        tableBody.innerHTML = "";

        if (rawData.length === 0) {
            tableBody.innerHTML = '<tr><td colspan="7" style="text-align:center">No hay registros actualmente.</td></tr>';
            return;
        }

        rawData.slice().reverse().forEach(item => {
            const fullFecha = item.Fecha || item.fecha || "";
            const fechaPartes = fullFecha.split(', ');
            const fecha = fechaPartes[0] || "---";
            const hora = fechaPartes[1] || "---";

            // Nombre con formato correcto
            const nombreRaw = (item.Nombre || item.nombre || "");
            const apellidoRaw = (item.Apellido || item.apellido || "");
            const nombreCompleto = (nombreRaw + " " + apellidoRaw).trim();

            const idEmpleado = item.Identificacion || item.id || "N/A";
            const correctas = parseInt(item.Correctas || item.correctas || 0);
            const score = Math.round((correctas / 50) * 100);

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${fecha}</td>
                <td>${hora}</td>
                <td style="font-family: monospace; font-weight: bold;">${idEmpleado}</td>
                <td><strong>${nombreCompleto}</strong></td>
                <td style="text-align:center; color:green; font-weight:bold">${correctas}</td>
                <td style="text-align:center" class="score-text">${score}</td>
                <td style="text-align:center"><span class="status-badge">${score}%</span></td>
            `;
            tableBody.appendChild(tr);
        });

    } catch (e) {
        tableBody.innerHTML = `<tr><td colspan="7" style="text-align:center; color:red">Error: ${e.message}</td></tr>`;
    }
}

async function resetData() {
    const clave = prompt("Ingrese la clave de seguridad para borrar todos los registros:");
    
    // Puedes cambiar '1234' por la clave que prefieras
    if (clave === "21705") {
        if (confirm("¿Estás seguro? Esta acción no se puede deshacer.")) {
            const url = `https://api.github.com/repos/${GITHUB_CFG.repo}/contents/${GITHUB_CFG.path}`;
            
            try {
                const res = await fetch(url, {
                    method: "PUT",
                    headers: { 
                        "Authorization": `token ${GITHUB_CFG.token}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        message: "Reset de base de datos",
                        content: btoa("[]"), // Guardamos un array vacío
                        sha: currentSha
                    })
                });

                if (res.ok) {
                    alert("Base de datos limpia.");
                    loadData(); // Recargar tabla
                } else {
                    alert("Error al intentar limpiar los datos.");
                }
            } catch (e) {
                alert("Error de red: " + e.message);
            }
        }
    } else if (clave !== null) {
        alert("Clave incorrecta.");
    }
}

function exportExcel() {
    if(rawData.length === 0) return alert("No hay datos para exportar");
    
    const dataToExport = rawData.map(item => {
        const correctas = parseInt(item.Correctas || item.correctas || 0);
        return {
            Fecha: (item.Fecha || "").split(', ')[0],
            Hora: (item.Fecha || "").split(', ')[1],
            ID_Empleado: item.Identificacion || item.id,
            Nombre: (item.Nombre || "") + " " + (item.Apellido || ""),
            Correctas: correctas,
            Puntaje: Math.round((correctas / 50) * 100) + "%"
        };
    });
    
    const ws = XLSX.utils.json_to_sheet(dataToExport);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Resultados");
    XLSX.writeFile(wb, "Reporte_General_La_Aurora.xlsx");
}

loadData();
</script>

</body>
</html>
