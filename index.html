<!doctype html>

<html lang="es">

<head>

    <meta charset="utf-8" />

    <meta name="viewport" content="width=device-width,initial-scale=1" />

    <title>Examen — Automatización Electrónica La Aurora</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>

        :root { 

            --blue: #1e6fff; 

            --bg: #0f172a; 

            --card: rgba(255, 255, 255, 0.92);

            --text: #1e293b; 

            --border: #e2e8f0; 

            --success: #22c55e;

            --danger: #ef4444;

        }

      

        body { 

            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;

            color: var(--text);

            margin: 0;

            padding: 10px;

            min-height: 100vh;

            background-color: var(--bg);

            background-image: linear-gradient(rgba(15, 23, 42, 0.5), rgba(15, 23, 42, 0.5)), url('La-Aurora-107-Nicaragua-Robusto-2.png'); 

            background-size: cover;

            background-position: center;

            background-attachment: fixed;

            display: flex;

            align-items: center;

            justify-content: center;

        }



        .main-wrapper {

            display: flex;

            width: 100%;

            max-width: 1000px;

            min-height: 550px;

            background: var(--card);

            backdrop-filter: blur(12px);

            border-radius: 24px;

            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);

            overflow: hidden;

            border: 1px solid rgba(255, 255, 255, 0.3);

        }



        .sidebar-catalog {

            width: 35%;

            background: #000;

            position: relative;

            display: flex;

            flex-direction: column;

            border-right: 1px solid rgba(0,0,0,0.1);

        }



        .sidebar-catalog img {

            width: 100%;

            height: 100%;

            object-fit: cover;

            position: absolute;

            transition: opacity 1.5s ease-in-out;

            opacity: 0;

        }

        .sidebar-catalog img.active { opacity: 0.7; }



        .sidebar-info {

            position: relative;

            z-index: 2;

            margin-top: auto;

            padding: 20px;

            background: linear-gradient(transparent, rgba(0,0,0,0.9));

            color: white;

        }



        .container { width: 65%; overflow-y: auto; max-height: 90vh; display: flex; flex-direction: column; }

        .hidden { display: none !important; }

        .view-padding { padding: 30px; }



        .welcome-box {

            max-width: 400px;

            margin: 0 auto;

            background: white;

            padding: 20px;

            border-radius: 16px;

            border: 1px solid var(--border);

            text-align: center;

        }



        .welcome-box img { 

            height: 95px; 

            width: auto; 

            margin-bottom: 30px; 

        }



        .welcome-box h1 { font-size: 22px; margin: 0; color: #0f172a; }

        .welcome-box p { font-size: 14px; margin: 5px 0 20px; color: #64748b; }



        .instructions-block {

            background: #f8fafc;

            padding: 12px;

            border-radius: 10px;

            margin-bottom: 20px;

            border-left: 4px solid var(--blue);

            font-size: 13px;

            text-align: left;

        }



        .form-input {

            width: 100%;

            padding: 10px 12px;

            margin-bottom: 10px;

            border-radius: 8px;

            border: 1px solid #ddd;

            box-sizing: border-box;

            font-size: 14px;

        }



        .name-fields { display: flex; gap: 8px; }



        .progress-container {

            width: 100%;

            height: 8px;

            background: #e2e8f0;

            border-radius: 10px;

            margin-bottom: 25px;

            overflow: hidden;

        }

        .progress-bar {

            height: 100%;

            background: var(--blue);

            width: 0%;

            transition: width 0.4s ease;

        }



        .question-box {

            background: white;

            padding: 25px;

            border-radius: 16px;

            border: 1px solid var(--border);

        }



        .question-text { 

            font-size: 19px; 

            font-weight: 700; 

            margin-bottom: 20px; 

            line-height: 1.4; 

            color: #0f172a; 

        }

        

        .option-label { 

            display: flex; 

            align-items: center; 

            padding: 14px; 

            border: 1px solid var(--border); 

            border-radius: 12px; 

            margin-bottom: 10px; 

            cursor: pointer; 

            font-size: 15px;

            background: #fff;

        }

        .option-label:hover { border-color: var(--blue); background: #f8faff; }

        .option-label.selected { border-color: var(--blue); background: #eff6ff; }

        .option-label input { margin-right: 12px; }



        .btn { padding: 14px 24px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; transition: 0.3s; font-size: 15px; }

        .btn-primary { background: var(--blue); color: white; }

        .btn-outline { background: #f1f5f9; color: #64748b; }



        @media (max-width: 900px) { 

            .main-wrapper { flex-direction: column; }

            .sidebar-catalog { width: 100%; height: 180px; }

            .container { width: 100%; }

        }

    </style>

</head>

<body>



<div class="main-wrapper">

    <div class="sidebar-catalog" id="slideshow">

        <div class="sidebar-info">

            <h3 style="margin:0">La Aurora</h3>

            <p style="margin:5px 0 0; font-size:13px; opacity:0.8">Automatización e Innovación</p>

        </div>

    </div>



    <div class="container">

        <div id="view-start" class="view-padding">

            <div class="welcome-box">

                <img src="La_Aurora.png" alt="Logo">

                <h1>Evaluación Técnica</h1>

                <p>Instrumentación y Electrónica</p>

                

                <div class="instructions-block">

                    <strong>Instrucciones:</strong> 50 preguntas disponibles. Tienes 30 minutos para completar el examen.

                </div>



                <div class="name-fields">

                    <input type="text" id="inputName" class="form-input" placeholder="Nombre(s)">

                    <input type="text" id="inputLastName" class="form-input" placeholder="Apellido(s)">

                </div>

                <input type="text" id="inputId" class="form-input" placeholder="ID de Empleado / Cédula">

                

                <button class="btn btn-primary" style="width:100%; margin-top: 10px;" onclick="startExam()">COMENZAR EXAMEN</button>

            </div>

        </div>



        <div id="view-exam" class="view-padding hidden">

            <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>

            

            <div style="display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: 700;">

                <span id="progressText" style="color: var(--blue);">Pregunta 1/50</span>

                <span id="timerDisplay" style="color: var(--danger);">30:00</span>

            </div>



            <div id="questionArea" class="question-box"></div>



            <div style="display: flex; gap: 15px; margin-top: 25px;">

                <button class="btn btn-outline" id="btnPrev" onclick="prevQuestion()" style="flex:1">Anterior</button>

                <button class="btn btn-primary" id="btnNext" onclick="nextQuestion()" style="flex:2">Siguiente</button>

            </div>

        </div>



        <div id="view-results" class="view-padding hidden" style="text-align:center">

            <h2 id="resultUser" style="margin-bottom:10px"></h2>

            <div style="font-size: 70px; font-weight: 900; color: var(--blue); margin: 15px 0;" id="finalScore">0%</div>

            <div style="display: flex; gap: 15px; justify-content: center; margin-bottom: 25px;">

                <div style="background:#f1f5f9; padding:15px; border-radius:12px; flex:1">Correctas: <br><strong id="statCorrect" style="color:var(--success); font-size:18px"></strong></div>

                <div style="background:#f1f5f9; padding:15px; border-radius:12px; flex:1">Incorrectas: <br><strong id="statWrong" style="color:var(--danger); font-size:18px"></strong></div>

            </div>

            <p id="syncStatus" style="font-size: 12px; color: #64748b; margin-bottom: 10px;">Sincronizando con base de datos...</p>

            <button class="btn btn-primary" onclick="exportToExcel()" style="width:100%">📥 DESCARGAR MI REPORTE PERSONAL</button>

            <button class="btn btn-outline" style="width:100%; margin-top:12px" onclick="location.reload()">Nuevo Intento</button>

        </div>

    </div>

</div>



<script>

// --- CONFIGURACIÓN GITHUB PROTEGIDA ---
const p1 = "ghp_1wl7juso1XZbEys8";
const p2 = "lfuaovonugXpbI0kV0h5";

const GITHUB_CFG = {
    token: p1 + p2, 
    repo: "humberto1988hudl-rgb/Examen-actualizado",
    path: "resultados_instrumentacion.json"
};

const CATALOG_IMAGES = ["La_Aurora1.png", "La_Aurora2.png", "La_Aurora3.png", "La_Aurora4.png", "La_Aurora5.png", "La_Aurora6.png"];
const QUESTIONS_BASE = [
  {q:'P1: ¿Cuál es el voltaje de la acometida principal trifásica?', a:['220V', '480V', '120V', '24V'], c:1},
  {q:'P2: ¿Qué modelo de PLC Omron se utiliza en el sistema?', a:['CP1L', 'CJ2M', 'NX1P', 'CPM1A'], c:0},
  {q:'P3: Potencia y voltaje de la resistencia "Sellado Centro":', a:['250W/120V', '500W/220V', '100W/120V', '100W/24V'], c:2},
  {q:'P4: ¿Qué componente protege las líneas de entrada L1, L2 y L3?', a:['Relé térmico', 'Fusibles/Breaker principal', 'Contactor K1', 'Transformador T1'], c:1},
  {q:'P5: Voltaje de salida de los transformadores T1, T2 y T3:', a:['24V', '220V', '120V', '480V'], c:2},
  {q:'P6: Marca del variador de frecuencia (VFD) en el diseño:', a:['Siemens', 'Schneider', 'Omron', 'Allen-Bradley'], c:2},
  {q:'P7: Dispositivo Schneider para desconexión en ventilación:', a:['Selector', 'Seccionador', 'Pulsador de paro', 'Luz piloto'], c:1},
  {q:'P8: Ingeniero que revisó los planos de La Aurora:', a:['Jose Ulloa', 'Randal Paulino', 'Carlos Cabreja', 'Juan Pérez'], c:2},
  {q:'P9: ¿Qué canal del PLC corresponde a las entradas (Inputs)?', a:['CH0', 'CH100', 'CH1', 'CH200'], c:0},
  {q:'P10: ¿Qué canal del PLC corresponde a las salidas (Outputs)?', a:['CH0', 'CH100', 'CH1', 'CH50'], c:1},
  {q:'P11: Voltaje de operación de los controles de temperatura E5CC:', a:['480V', '24V DC', '120V AC', '220V AC'], c:2},
  {q:'P12: ¿Cuántos bloques de borneras principales hay en el panel?', a:['1', '2', '3', '5'], c:2},
  {q:'P13: Potencia de la resistencia "Pegador Punto Centro":', a:['100W', '200W', '50W', '500W'], c:0},
  {q:'P14: ¿Qué indica la sigla "COM" en el cableado del PLC?', a:['Comunicación', 'Común', 'Compresor', 'Control'], c:1},
  {q:'P15: ¿Qué tipo de conector se usa para las resistencias?', a:['RJ45', 'USB', 'Harting', 'DB9'], c:2},
  {q:'P16: ¿En qué parte del panel se encuentran ubicados los transformadores T1, T2, T3 y T4?', a:['En la puerta del panel', 'En el fondo del gabinete (Plato)', 'En el exterior del panel', 'Cerca del extractor'], c:1},
  {q:'P17: ¿Qué dispositivo se utiliza para la protección térmica de los motores según la distribución interna?', a:['Relés térmicos / Guardamotores', 'Fusibles de vidrio', 'Borneras de tierra', 'Luz piloto roja'], c:0},
  {q:'P18: ¿Cómo están organizados los bloques de borneras en la parte inferior del panel?', a:['En un solo bloque largo', 'Divididos en Primer, Segundo y Tercer bloque', 'No hay borneras en la parte inferior', 'Están mezclados con los breakers'], c:1},
  {q:'P19: ¿Qué componente de control de potencia se encuentra junto al PLC en el riel DIN?', a:['Los transformadores', 'Los relés de interfaz (MY2)', 'El medidor de energía', 'La fuente de alimentación'], c:1},
  {q:'P20: ¿Qué dispositivo de ventilación se observa en el plano para el enfriamiento del panel?', a:['Un aire acondicionado industrial', 'Un extractor de aire con rejilla', 'Un compresor de aire', 'No requiere ventilación'], c:1},
  {q:'P21: ¿Qué significa la sigla "NO" en un botón de arranque?', a:['Normalmente Abierto', 'No Operativo', 'Nivel Óptimo', 'Nueva Orden'], c:0},
  {q:'P22: ¿Qué tipo de canaleta se utiliza para organizar el cableado interno?', a:['Canaleta ranurada de PVC', 'Tubería EMT', 'Tubería Liquid-tight', 'Cableado al aire libre'], c:0},
  {q:'P23: ¿Dónde se ubica físicamente el Variador de Frecuencia (VFD) dentro del panel?', a:['En la puerta junto a los botones', 'En el riel superior del plato interno', 'En la parte externa de la máquina', 'Debajo del PLC'], c:1},
  {q:'P24: ¿Qué elemento del panel interno permite la conexión rápida con los periféricos externos?', a:['Los conectores tipo Harting', 'Soldadura directa', 'Cinta aislante', 'Empalmes rápidos'], c:0},
  {q:'P25: ¿Qué componente protege el circuito de control de 120V AC después del transformador?', a:['Breaker de control o fusibles', 'El variador de frecuencia', 'El PLC directamente', 'Un sensor de proximidad'], c:0},
  {q:'P26: ¿Cuál es la función de los relés Omron MY2 que están en el panel?', a:['Regular la velocidad del motor', 'Servir de interfaz entre el PLC y las cargas', 'Medir el voltaje de entrada', 'Controlar la temperatura'], c:1},
  {q:'P27: Voltaje del transformador T4 según el plano:', a:['480V a 220V', '480V a 120V', '120V a 24V', '220V a 110V'], c:0},
  {q:'P28: ¿Qué dispositivo cuenta pulsos o tiempo en el panel?', a:['PLC', 'Variador', 'Contador H7EC', 'Sensor'], c:2},
  {q:'P29: Voltaje de la lógica de control del variador 3G3MX2:', a:['120V AC', '24V DC', '480V AC', '220V AC'], c:1},
  {q:'P30: ¿Qué resistencia tiene 100W/120V en el "Pegador Atrás"?', a:['Sellado', 'Pegador punto', 'Resistencia folder', 'Abanico'], c:1},
  {q:'P31: ¿Cuántas fases tiene la alimentación principal?', a:['1 fase', '2 fases', '3 fases', 'DC'], c:2},
  {q:'P32: ¿En qué página se detalla la "Potencia Control"?', a:['Página 1', 'Página 7', 'Página 3', 'Página 12'], c:1},
  {q:'P33: El modelo CP1L es fabricado por:', a:['Omron', 'Siemens', 'Mitsubishi', 'Delta'], c:0},
  {q:'P34: ¿A qué página debes ir para ver el conector de telemetría?', a:['Página 4', 'Página 15', 'Página 2', 'Página 8'], c:1},
  {q:'P35: ¿Qué significa la sigla "NC" en un contacto de relé?', a:['No Conectado', 'Normalmente Cerrado', 'Nivel Crítico', 'Nueva Carga'], c:1},
  {q:'P36: ¿Qué significa la sigla "NO" en un botón de arranque?', a:['Normalmente Abierto', 'No Operativo', 'Nivel Óptimo', 'Nueva Orden'], c:0},
  {q:'P37: ¿Cuál es la función del transformador en el panel?', a:['Aumentar corriente', 'Reducir voltaje para control', 'Medir energía', 'Filtrar ruido'], c:1},
  {q:'P38: En el índice, ¿qué tema trata la página 4?', a:['Entradas PLC', 'Harting Resistencias', 'Distribución Panel', 'Potencia Principal'], c:1},
  {q:'P39: ¿Para qué sirve el variador de frecuencia?', a:['Controlar temperatura', 'Controlar velocidad de motor', 'Medir presión', 'Protección térmica'], c:1},
  {q:'P40: ¿Qué elemento se usa para el paro de emergencia?', a:['Selector', 'HMI', 'Pulsador tipo hongo', 'Interruptor'], c:2},
  {q:'P41: Voltaje de las luces piloto del panel:', a:['480V', '120V', '24V DC', '220V'], c:1},
  {q:'P42: ¿Qué componente evita cortocircuitos en el secundario?', a:['Fusibles', 'Borneras', 'Luz piloto', 'Gabinete'], c:0},
  {q:'P43: ¿Cómo se identifica el neutro en el esquema?', a:['L1', 'GND', 'N', 'PE'], c:2},
  {q:'P44: ¿Cómo se identifica la tierra física?', a:['T', 'PE / GND', 'L3', 'C'], c:1},
  {q:'P45: ¿Qué cable se usa para señales analógicas?', a:['THHN', 'Cable apantallado/shield', 'Utopía', 'Paralelo'], c:1},
  {q:'P46: Función de las borneras en el panel:', a:['Generar voltaje', 'Puntos de conexión y orden', 'Protección térmica', 'Lógica programable'], c:1},
  {q:'P47: ¿Qué hace el relé de 24V?', a:['Maneja alta potencia', 'Interfaz entre PLC y carga', 'Mide temperatura', 'Cambia la frecuencia'], c:1},
  {q:'P48: ¿Dónde se monta el PLC normalmente?', a:['Puerta del panel', 'Riel DIN', 'Fondo del gabinete', 'Exterior de la máquina'], c:1},
  {q:'P49: ¿Qué instrumento mide la temperatura en el proceso?', a:['Termocupla/RTD', 'Amperímetro', 'Voltímetro', 'Presostato'], c:0},
  {q:'P50: ¿Para qué sirve el extractor/abanico del panel?', a:['Limpiar polvo', 'Enfriar componentes internos', 'Mover la máquina', 'Secar el producto'], c:1},
];



let questions = [], currentIndex = 0, userAnswers = [], studentData = {};

let timerInterval, remainingSeconds = 30 * 60;



function init() {

    const container = document.getElementById('slideshow');

    CATALOG_IMAGES.forEach((url, i) => {

        const img = document.createElement('img'); img.src = url;

        if(i===0) img.classList.add('active'); container.appendChild(img);

    });

    let slideIdx = 0;

    setInterval(() => {

        const imgs = container.getElementsByTagName('img');

        if(imgs.length > 0) {

            imgs[slideIdx % imgs.length].classList.remove('active');

            slideIdx++;

            imgs[slideIdx % imgs.length].classList.add('active');

        }

    }, 5000);



    questions = QUESTIONS_BASE.map(item => {

        let indices = [0,1,2,3].sort(() => Math.random() - 0.5);

        return { q: item.q, options: indices.map(i => item.a[i]), correct: indices.indexOf(0) };

    });

    userAnswers = Array(questions.length).fill(null);

}



function startExam() {

    const n = document.getElementById('inputName').value.trim();

    const l = document.getElementById('inputLastName').value.trim();

    if(!n || !l) return alert("Por favor escribe nombre y apellido.");

    studentData = { name: n, lastName: l, id: document.getElementById('inputId').value };

    document.getElementById('view-start').classList.add('hidden');

    document.getElementById('view-exam').classList.remove('hidden');

    renderQuestion();

    timerInterval = setInterval(updateTimer, 1000);

}



function updateTimer() {

    remainingSeconds--;

    let m = Math.floor(remainingSeconds/60), s = remainingSeconds%60;

    document.getElementById('timerDisplay').textContent = `${m}:${s<10?'0':''}${s}`;

    if(remainingSeconds <= 0) finishExam();

}



function renderQuestion() {

    const q = questions[currentIndex];

    const progress = ((currentIndex + 1) / 50) * 100;

    document.getElementById('progressBar').style.width = `${progress}%`;

    document.getElementById('progressText').textContent = `Pregunta ${currentIndex+1}/50`;

    let h = `<div class="question-text">${q.q}</div>`;

    q.options.forEach((o, i) => {

        h += `<label class="option-label ${userAnswers[currentIndex] === i ? 'selected' : ''}">

                <input type="radio" name="opt" onclick="selectOption(${i})" ${userAnswers[currentIndex] === i ? 'checked' : ''}> ${o}

              </label>`;

    });

    document.getElementById('questionArea').innerHTML = h;

    document.getElementById('btnPrev').disabled = currentIndex === 0;

    document.getElementById('btnNext').textContent = currentIndex === 49 ? "FINALIZAR" : "Siguiente";

}



function selectOption(i) {

    userAnswers[currentIndex] = i;

    renderQuestion();

}



function nextQuestion() {

    if(userAnswers[currentIndex] === null) return alert("Por favor selecciona una respuesta.");

    if(currentIndex < 49) { currentIndex++; renderQuestion(); }

    else { if(confirm("¿Deseas finalizar el examen?")) finishExam(); }

}



function prevQuestion() { if(currentIndex > 0) { currentIndex--; renderQuestion(); } }



async function finishExam() {

    clearInterval(timerInterval);

    let correct = 0;

    questions.forEach((q,i) => { if(userAnswers[i]===q.correct) correct++; });

    const score = Math.round((correct/50)*100);

    

    document.getElementById('view-exam').classList.add('hidden');

    document.getElementById('view-results').classList.remove('hidden');

    document.getElementById('resultUser').textContent = `${studentData.name} ${studentData.lastName}`;

    document.getElementById('finalScore').textContent = score + "%";

    document.getElementById('statCorrect').textContent = correct;

    document.getElementById('statWrong').textContent = 50 - correct;



    const record = { 

        Nombre: studentData.name, 

        Apellido: studentData.lastName, 

        Identificacion: studentData.id, 

        Puntaje: score + "%", 

        Correctas: correct, 

        Fecha: new Date().toLocaleString() 

    };



    // Guardar localmente (respaldo)

    let history = JSON.parse(localStorage.getItem('exam_data_la_aurora') || "[]");

    history.unshift(record);

    localStorage.setItem('exam_data_la_aurora', JSON.stringify(history));



    // SUBIR A GITHUB CENTRAL

    await syncToGitHub(record);

}



async function syncToGitHub(newRecord) {

    const url = `https://api.github.com/repos/${GITHUB_CFG.repo}/contents/${GITHUB_CFG.path}`;

    const status = document.getElementById('syncStatus');

    

    try {

        const res = await fetch(url, { headers: { "Authorization": `token ${GITHUB_CFG.token}` } });

        const file = await res.json();

        let content = JSON.parse(atob(file.content));

        content.push(newRecord);



        const update = await fetch(url, {

            method: "PUT",

            headers: { "Authorization": `token ${GITHUB_CFG.token}`, "Content-Type": "application/json" },

            body: JSON.stringify({

                message: `Resultado: ${newRecord.Nombre}`,

                content: btoa(JSON.stringify(content, null, 2)),

                sha: file.sha

            })

        });



        if(update.ok) status.innerHTML = "✅ Registrado en base de datos central.";

        else status.innerHTML = "⚠️ Error al sincronizar. Guarde su reporte manual.";

    } catch (e) {

        status.innerHTML = "❌ Error de conexión. Guarde su reporte manual.";

    }

}



function exportToExcel() {

    const data = JSON.parse(localStorage.getItem('exam_data_la_aurora') || "[]");

    const ws = XLSX.utils.json_to_sheet(data);

    const wb = XLSX.utils.book_new();

    XLSX.utils.book_append_sheet(wb, ws, "Mis_Resultados");

    XLSX.writeFile(wb, `Reporte_${studentData.name}.xlsx`);

}



init();

</script>

</body>

</html>
