<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { 
            --blue: #1e6fff; 
            --bg: #0f172a; 
            --card: rgba(255, 255, 255, 0.92);
            --text: #1e293b; 
            --border: #e2e8f0; 
            --success: #22c55e;
            --danger: #ef4444;
        }
      
        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: var(--text);
            margin: 0;
            padding: 10px;
            min-height: 100vh;
            background-color: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .main-wrapper {
            display: flex;
            width: 100%;
            max-width: 1000px;
            min-height: 550px;
            background: var(--card);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .sidebar-catalog {
            width: 35%;
            background: #000;
            position: relative;
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(0,0,0,0.1);
        }

        .sidebar-catalog img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            transition: opacity 1.5s ease-in-out;
            opacity: 0;
        }
        .sidebar-catalog img.active { opacity: 0.7; }

        .sidebar-info {
            position: relative;
            z-index: 2;
            margin-top: auto;
            padding: 20px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            color: white;
        }

        .container { width: 65%; overflow-y: auto; max-height: 90vh; display: flex; flex-direction: column; }
        .hidden { display: none !important; }
        .view-padding { padding: 30px; }

        .welcome-box {
            max-width: 400px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--border);
            text-align: center;
        }

        .welcome-box img { 
            height: 95px; 
            width: auto; 
            margin-bottom: 30px; 
        }

        .welcome-box h1 { font-size: 22px; margin: 0; color: #0f172a; }
        .welcome-box p { font-size: 14px; margin: 5px 0 20px; color: #64748b; }

        .instructions-block {
            background: #f8fafc;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 4px solid var(--blue);
            font-size: 13px;
            text-align: left;
        }

        .form-input {
            width: 100%;

            margin-bottom: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
            box-sizing: border-box;
            font-size: 14px;

        .name-fields { display: flex; gap: 8px; }

            height: 8px;
            background: #e2e8f0;
            border-radius: 10px;
            margin-bottom: 25px;
            overflow: hidden;
        }

            height: 100%;
            background: var(--blue);

            transition: width 0.4s ease;
        }

        .question-box {

            padding: 25px;
            border-radius: 16px;

        }

            margin-bottom: 20px;

let questions = [], currentIndex = 0, userAnswers = [], studentData = {};
let timerInterval, remainingSeconds = 20 * 60;

function init() {
    // Slideshow
    const container = document.getElementById('slideshow');
    CATALOG_IMAGES.forEach((url, i) => {
        const img = document.createElement('img'); img.src = url;
        if(i===0) img.classList.add('active'); container.appendChild(img);
    });
    let slideIdx = 0;
    setInterval(() => {
        const imgs = container.getElementsByTagName('img');
        if(imgs.length > 0) {
            imgs[slideIdx % imgs.length].classList.remove('active');
            slideIdx++;
            imgs[slideIdx % imgs.length].classList.add('active');
        }
    }, 5000);

    // Preparar preguntas con mezcla aleatoria de opciones
    questions = QUESTIONS_BASE.map(item => {
        let options = [...item.a];
        let correctText = options[item.c];
        options.sort(() => Math.random() - 0.5);
        return { 
            q: item.q, 
            options: options, 
            correct: options.indexOf(correctText) 
        };
    });
    userAnswers = Array(questions.length).fill(null);
}

function startExam() {
    const n = document.getElementById('inputName').value.trim();
    const l = document.getElementById('inputLastName').value.trim();
    const id = document.getElementById('inputId').value.trim();
    if(!n || !l || !id) return alert("Por favor complete nombre, apellido e identificación.");
    
    studentData = { name: n, lastName: l, id: id };
    document.getElementById('view-start').classList.add('hidden');
    document.getElementById('view-exam').classList.remove('hidden');
    renderQuestion();
    timerInterval = setInterval(updateTimer, 1000);
}

function updateTimer() {
    remainingSeconds--;
    if(remainingSeconds <= 0) { finishExam(); return; }
    let m = Math.floor(remainingSeconds/60), s = remainingSeconds%60;
    document.getElementById('timerDisplay').textContent = `${m}:${s<10?'0':''}${s}`;
}

function renderQuestion() {
    const q = questions[currentIndex];
    const pct = ((currentIndex + 1) / questions.length) * 100;
    document.getElementById('progressBar').style.width = pct + "%";
    document.getElementById('progressText').textContent = `Pregunta ${currentIndex + 1}/${questions.length}`;

    let h = `<div class="question-text">${q.q}</div>`;
    q.options.forEach((o, i) => {
        const isSelected = (userAnswers[currentIndex] === i);
        h += `<label class="option-label ${isSelected ? 'selected' : ''}">
                <input type="radio" name="opt" onclick="selectOption(${i})" ${isSelected ? 'checked' : ''}> ${o}
              </label>`;
    });
    document.getElementById('questionArea').innerHTML = h;
    
    document.getElementById('btnPrev').disabled = currentIndex === 0;
    document.getElementById('btnNext').textContent = currentIndex === (questions.length - 1) ? "FINALIZAR" : "Siguiente";
}

function selectOption(i) {
    userAnswers[currentIndex] = i;
    renderQuestion();
}

function nextQuestion() {
    if(userAnswers[currentIndex] === null) return alert("Por favor selecciona una respuesta.");
    if(currentIndex < (questions.length - 1)) { currentIndex++; renderQuestion(); }
    else { if(confirm("¿Deseas finalizar el examen?")) finishExam(); }
}

function prevQuestion() { if(currentIndex > 0) { currentIndex--; renderQuestion(); } }

async function finishExam() {
    clearInterval(timerInterval);
    let correct = 0;
    questions.forEach((q, i) => { if(userAnswers[i] === q.correct) correct++; });
    
    const score = Math.round((correct/questions.length)*100);
    
    document.getElementById('view-exam').classList.add('hidden');
    document.getElementById('view-results').classList.remove('hidden');
    document.getElementById('resultUser').textContent = `${studentData.name} ${studentData.lastName}`;
    document.getElementById('finalScore').textContent = score + "%";
    document.getElementById('statCorrect').textContent = correct;
    document.getElementById('statWrong').textContent = questions.length - correct;

    const resultObj = { 
        Nombre: studentData.name, 
        Apellido: studentData.lastName, 
        Identificacion: studentData.id, 
        Puntaje: score, 
        Correctas: correct, 
        Fecha: new Date().toLocaleString() 
    };

    await saveToGitHub(resultObj);
}

async function saveToGitHub(newResult) {
    const url = `https://api.github.com/repos/${GITHUB_CFG.repo}/contents/${GITHUB_CFG.path}`;
    try {
        const res = await fetch(url, { headers: { "Authorization": `token ${GITHUB_CFG.token}` } });
        let sha = "", content = [];
        if(res.ok) {
            const json = await res.json();
            sha = json.sha;
            content = JSON.parse(atob(json.content));
        }
        content.push(newResult);
        await fetch(url, {
            method: "PUT",
            headers: { "Authorization": `token ${GITHUB_CFG.token}`, "Content-Type": "application/json" },
            body: JSON.stringify({
                message: "Nuevo resultado de examen",
                content: btoa(JSON.stringify(content, null, 2)),
                sha: sha
            })
        });
    } catch(e) { console.error("Error guardando datos:", e); }
}

function exportToExcel() {
    const data = [{
        Nombre: studentData.name,
        Apellido: studentData.lastName,
        ID: studentData.id,
        Correctas: document.getElementById('statCorrect').textContent,
        Puntaje: document.getElementById('finalScore').textContent,
        Fecha: new Date().toLocaleString()
    }];
    const ws = XLSX.utils.json_to_sheet(data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Resultado");
    XLSX.writeFile(wb, `Resultado_${studentData.lastName}.xlsx`);
}

init();
