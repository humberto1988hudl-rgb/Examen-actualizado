<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Examen — Automatización Electrónica La Aurora</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { 
            --blue: #1e6fff; 
            --bg: #0f172a; 
            --card: rgba(255, 255, 255, 0.95);
            --text: #1e293b; 
            --border: #e2e8f0; 
        }
      
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 10px;
            min-height: 100vh;
            background-color: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .main-wrapper {
            display: flex;
            width: 100%;
            max-width: 1100px;
            min-height: 600px;
            background: var(--card);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        .sidebar-catalog {
            width: 35%;
            background: #000;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-catalog img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            transition: opacity 1.5s ease-in-out;
            opacity: 0;
        }

        .sidebar-catalog img.active {
            opacity: 0.8;
        }

        .sidebar-info {
            position: relative;
            z-index: 10;
            margin-top: auto;
            padding: 25px;
            background: linear-gradient(transparent, rgba(0,0,0,0.95));
            color: white;
        }

        .container { width: 65%; overflow-y: auto; max-height: 90vh; padding: 40px; box-sizing: border-box; }
        .hidden { display: none !important; }
        
        .welcome-box { text-align: center; }
        .welcome-box img { height: 100px; margin-bottom: 25px; }
        
        .form-input { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 14px; }
        .name-fields { display: flex; gap: 12px; }

        .progress-container { width: 100%; height: 12px; background: #eee; border-radius: 6px; margin-bottom: 25px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--blue); width: 0%; transition: 0.4s; }

        .question-text { font-size: 20px; font-weight: 700; margin-bottom: 25px; color: #0f172a; line-height: 1.4; }

        .option-label { 
            display: flex; align-items: center; padding: 16px; 
            border: 1px solid var(--border); border-radius: 12px; 
            margin-bottom: 12px; cursor: pointer; transition: 0.2s;
            background: #fff;
        }
        .option-label:hover { background: #f8fbff; border-color: var(--blue); }
        .option-label.selected { background: #eff6ff; border-color: var(--blue); border-width: 2px; }
        
        .btn { padding: 16px 24px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; transition: 0.3s; font-size: 15px; }
        .btn-primary { background: var(--blue); color: white; }
        .btn-outline { background: #f1f5f9; color: #64748b; }

        @media (max-width: 850px) {
            .main-wrapper { flex-direction: column; }
            .sidebar-catalog { width: 100%; height: 220px; }
            .container { width: 100%; padding: 25px; }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="sidebar-catalog" id="imageContainer">
        <div class="sidebar-info">
            <h2 style="margin:0">La Aurora</h2>
            <p style="margin:5px 0 0; font-size:14px; opacity:0.8">Excelencia en Automatización</p>
        </div>
    </div>

    <div class="container">
        <div id="view-start">
            <div class="welcome-box">
                <img src="La_Aurora.png" alt="Logo La Aurora">
                <h1 style="margin-bottom:10px">Examen de Instrumentación</h1>
                <p style="color:#64748b; margin-bottom:30px">Complete sus datos para iniciar la evaluación técnica.</p>
                <div class="name-fields">
                    <input type="text" id="inputName" class="form-input" placeholder="Nombre(s)">
                    <input type="text" id="inputLastName" class="form-input" placeholder="Apellido(s)">
                </div>
                <input type="text" id="inputId" class="form-input" placeholder="ID de Empleado / Cédula">
                <button class="btn btn-primary" style="width:100%; margin-top:15px" onclick="startExam()">COMENZAR EVALUACIÓN</button>
            </div>
        </div>

        <div id="view-exam" class="hidden">
            <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
            <div style="display:flex; justify-content:space-between; margin-bottom:20px">
                <span id="progressText" style="font-weight:bold; color:var(--blue)"></span>
                <span id="timerDisplay" style="color:#ef4444; font-weight:bold; font-size:18px">30:00</span>
            </div>
            <div id="questionArea"></div>
            <div style="display:flex; gap:15px; margin-top:30px">
                <button class="btn btn-outline" style="flex:1" onclick="prevQuestion()">Anterior</button>
                <button class="btn btn-primary" style="flex:2" id="btnNext" onclick="nextQuestion()">Siguiente</button>
            </div>
        </div>

        <div id="view-results" class="hidden" style="text-align:center">
            <h2 id="resName" style="margin-bottom:5px"></h2>
            <p style="color:#64748b">Resultado de la evaluación:</p>
            <div style="font-size:80px; font-weight:900; color:var(--blue); margin: 20px 0;" id="resScore">0%</div>
            <div id="syncStatus" style="font-size:13px; margin-bottom:25px; padding:10px; border-radius:8px; background:#f8fafc">Sincronizando...</div>
            <button class="btn btn-primary" style="width:100%" onclick="exportToExcel()">📥 DESCARGAR MI REPORTE (EXCEL)</button>
            <button class="btn btn-outline" style="width:100%; margin-top:15px" onclick="location.reload()">VOLVER AL INICIO</button>
        </div>
    </div>
</div>

<script>
// CONFIGURACIÓN CENTRAL
const IMAGENES = ["La_Aurora1.png", "La_Aurora2.png", "La_Aurora3.png", "La_Aurora4.png", "La_Aurora5.png", "La_Aurora6.png"];
const GITHUB_CFG = {
    token: "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",
    repo: "humberto1988hudl-rgb/Examen-actualizado",
    path: "Resultados_Instrumentación.json"
};

const QUESTIONS_BASE = [
  {q:'¿Cuál es el voltaje de la acometida principal trifásica?', a:['220V', '480V', '120V', '24V'], c:1},
  {q:'¿Qué modelo de PLC Omron se utiliza en el sistema?', a:['CP1L', 'CJ2M', 'NX1P', 'CPM1A'], c:0},
  {q:'Potencia y voltaje de la resistencia "Sellado Centro":', a:['250W/120V', '500W/220V', '100W/120V', '100W/24V'], c:2},
  {q:'¿Qué componente protege las líneas de entrada L1, L2 y L3?', a:['Relé térmico', 'Fusibles/Breaker principal', 'Contactor K1', 'Transformador T1'], c:1},
  {q:'Voltaje de salida de los transformadores T1, T2 y T3:', a:['24V', '220V', '120V', '480V'], c:2},
  {q:'Marca del variador de frecuencia (VFD) en el diseño:', a:['Siemens', 'Schneider', 'Omron', 'Allen-Bradley'], c:2},
  {q:'Dispositivo Schneider para desconexión en ventilación:', a:['Selector', 'Seccionador', 'Pulsador de paro', 'Luz piloto'], c:1},
  {q:'Ingeniero que revisó los planos de La Aurora:', a:['Jose Ulloa', 'Randal Paulino', 'Carlos Cabreja', 'Juan Pérez'], c:2},
  {q:'¿Qué canal del PLC corresponde a las entradas (Inputs)?', a:['CH0', 'CH100', 'CH1', 'CH200'], c:0},
  {q:'¿Qué canal del PLC corresponde a las salidas (Outputs)?', a:['CH0', 'CH100', 'CH1', 'CH50'], c:1},
  {q:'Voltaje de operación de los controles de temperatura E5CC:', a:['480V', '24V DC', '120V AC', '220V AC'], c:2},
  {q:'¿Cuántos bloques de borneras principales hay en el panel?', a:['1', '2', '3', '5'], c:2},
  {q:'Potencia de la resistencia "Pegador Punto Centro":', a:['100W', '200W', '50W', '500W'], c:0},
  {q:'¿Qué indica la sigla "COM" en el cableado del PLC?', a:['Comunicación', 'Común', 'Compresor', 'Control'], c:1},
  {q:'¿Qué tipo de conector se usa para las resistencias?', a:['RJ45', 'USB', 'Harting', 'DB9'], c:2},
  {q:'¿En qué parte del panel se encuentran ubicados los transformadores T1, T2, T3 y T4?', a:['En la puerta del panel', 'En el fondo del gabinete (Plato)', 'En el exterior del panel', 'Cerca del extractor'], c:1},
  {q:'¿Qué dispositivo se utiliza para la protección térmica de los motores según la distribución interna?', a:['Relés térmicos / Guardamotores', 'Fusibles de vidrio', 'Borneras de tierra', 'Luz piloto roja'], c:0},
  {q:'¿Cómo están organizados los bloques de borneras en la parte inferior del panel?', a:['En un solo bloque largo', 'Divididos en Primer, Segundo y Tercer bloque', 'No hay borneras en la parte inferior', 'Están mezclados con los breakers'], c:1},
  {q:'¿Qué componente de control de potencia se encuentra junto al PLC en el riel DIN?', a:['Los transformadores', 'Los relés de interfaz (MY2)', 'El medidor de energía', 'La fuente de alimentación'], c:1},
  {q:'¿Qué dispositivo de ventilación se observa en el plano para el enfriamiento del panel?', a:['Un aire acondicionado industrial', 'Un extractor de aire con rejilla', 'Un compresor de aire', 'No requiere ventilación'], c:1},
  {q:'¿Qué significa la sigla "NO" en un botón de arranque?', a:['Normalmente Abierto', 'No Operativo', 'Nivel Óptimo', 'Nueva Orden'], c:0},
  {q:'¿Qué tipo de canaleta se utiliza para organizar el cableado interno?', a:['Canaleta ranurada de PVC', 'Tubería EMT', 'Tubería Liquid-tight', 'Cableado al aire libre'], c:0},
  {q:'¿Dónde se ubica físicamente el Variador de Frecuencia (VFD) dentro del panel?', a:['En la puerta junto a los botones', 'En el riel superior del plato interno', 'En la parte externa de la máquina', 'Debajo del PLC'], c:1},
  {q:'¿Qué elemento del panel interno permite la conexión rápida con los periféricos externos?', a:['Los conectores tipo Harting', 'Soldadura directa', 'Cinta aislante', 'Empalmes rápidos'], c:0},
  {q:'¿Qué componente protege el circuito de control de 120V AC después del transformador?', a:['Breaker de control o fusibles', 'El variador de frecuencia', 'El PLC directamente', 'Un sensor de proximidad'], c:0},
  {q:'¿Cuál es la función de los relés Omron MY2 que están en el panel?', a:['Regular la velocidad del motor', 'Servir de interfaz entre el PLC y las cargas', 'Medir el voltaje de entrada', 'Controlar la temperatura'], c:1},
  {q:'Voltaje del transformador T4 según el plano:', a:['480V a 220V', '480V a 120V', '120V a 24V', '220V a 110V'], c:0},
  {q:'¿Qué dispositivo cuenta pulsos o tiempo en el panel?', a:['PLC', 'Variador', 'Contador H7EC', 'Sensor'], c:2},
  {q:'Voltaje de la lógica de control del variador 3G3MX2:', a:['120V AC', '24V DC', '480V AC', '220V AC'], c:1},
  {q:'¿Qué resistencia tiene 100W/120V en el "Pegador Atrás"?', a:['Sellado', 'Pegador punto', 'Resistencia folder', 'Abanico'], c:1},
  {q:'¿Cuántas fases tiene la alimentación principal?', a:['1 fase', '2 fases', '3 fases', 'DC'], c:2},
  {q:'¿En qué página se detalla la "Potencia Control"?', a:['Página 1', 'Página 7', 'Página 3', 'Página 12'], c:1},
  {q:'El modelo CP1L es fabricado por:', a:['Omron', 'Siemens', 'Mitsubishi', 'Delta'], c:0},
  {q:'¿A qué página debes ir para ver el conector de telemetría?', a:['Página 4', 'Página 15', 'Página 2', 'Página 8'], c:1},
  {q:'¿Qué significa la sigla "NC" en un contacto de relé?', a:['No Conectado', 'Normalmente Cerrado', 'Nivel Crítico', 'Nueva Carga'], c:1},
  {q:'¿Qué significa la sigla "NO" en un botón de arranque?', a:['Normalmente Abierto', 'No Operativo', 'Nivel Óptimo', 'Nueva Orden'], c:0},
  {q:'¿Cuál es la función del transformador en el panel?', a:['Aumentar corriente', 'Reducir voltaje para control', 'Medir energía', 'Filtrar ruido'], c:1},
  {q:'En el índice, ¿qué tema trata la página 4?', a:['Entradas PLC', 'Harting Resistencias', 'Distribución Panel', 'Potencia Principal'], c:1},
  {q:'¿Para qué sirve el variador de frecuencia?', a:['Controlar temperatura', 'Controlar velocidad de motor', 'Medir presión', 'Protección térmica'], c:1},
  {q:'¿Qué elemento se usa para el paro de emergencia?', a:['Selector', 'HMI', 'Pulsador tipo hongo', 'Interruptor'], c:2},
  {q:'Voltaje de las luces piloto del panel:', a:['480V', '120V', '24V DC', '220V'], c:1},
  {q:'¿Qué componente evita cortocircuitos en el secundario?', a:['Fusibles', 'Borneras', 'Luz piloto', 'Gabinete'], c:0},
  {q:'¿Cómo se identifica el neutro en el esquema?', a:['L1', 'GND', 'N', 'PE'], c:2},
  {q:'¿Cómo se identifica la tierra física?', a:['T', 'PE / GND', 'L3', 'C'], c:1},
  {q:'¿Qué cable se usa para señales analógicas?', a:['THHN', 'Cable apantallado/shield', 'Utopía', 'Paralelo'], c:1},
  {q:'Función de las borneras en el panel:', a:['Generar voltaje', 'Puntos de conexión y orden', 'Protección térmica', 'Lógica programable'], c:1},
  {q:'¿Qué hace el relé de 24V?', a:['Maneja alta potencia', 'Interfaz entre PLC y carga', 'Mide temperatura', 'Cambia la frecuencia'], c:1},
  {q:'¿Dónde se monta el PLC normalmente?', a:['Puerta del panel', 'Riel DIN', 'Fondo del gabinete', 'Exterior de la máquina'], c:1},
  {q:'¿Qué instrumento mide la temperatura en el proceso?', a:['Termocupla/RTD', 'Amperímetro', 'Voltímetro', 'Presostato'], c:0},
  {q:'¿Para qué sirve el extractor/abanico del panel?', a:['Limpiar polvo', 'Enfriar componentes internos', 'Mover la máquina', 'Secar el producto'], c:1},
];

let questions = [], currentIndex = 0, userAnswers = [], studentData = {};
let timerInterval, timeLeft = 1800;

function init() {
    // 1. CARGAR IMÁGENES SIDEBAR
    const side = document.getElementById('imageContainer');
    IMAGENES.forEach((src, i) => {
        const img = document.createElement('img');
        img.src = src;
        if(i===0) img.classList.add('active');
        side.prepend(img);
    });

    // 2. ROTACIÓN DE IMÁGENES (4 segundos)
    let idxImg = 0;
    setInterval(() => {
        const imgs = side.querySelectorAll('img');
        if(imgs.length > 0) {
            imgs[idxImg].classList.remove('active');
            idxImg = (idxImg + 1) % imgs.length;
            imgs[idxImg].classList.add('active');
        }
    }, 4000);

    // 3. PREPARAR PREGUNTAS
    questions = QUESTIONS_BASE.map(q => ({
        ...q,
        shuffledOptions: q.a // En esta versión mantendremos el orden original para seguridad
    }));
    userAnswers = Array(questions.length).fill(null);
}

function startExam() {
    const n = document.getElementById('inputName').value.trim();
    if(!n) return alert("Por favor, ingrese su nombre.");
    studentData = { 
        nombre: n, 
        apellido: document.getElementById('inputLastName').value, 
        id: document.getElementById('inputId').value 
    };
    document.getElementById('view-start').classList.add('hidden');
    document.getElementById('view-exam').classList.remove('hidden');
    renderQuestion();
    
    timerInterval = setInterval(() => {
        timeLeft--;
        let m = Math.floor(timeLeft/60), s = timeLeft%60;
        document.getElementById('timerDisplay').textContent = `${m}:${s<10?'0':''}${s}`;
        if(timeLeft <= 0) finishExam();
    }, 1000);
}

function renderQuestion() {
    const q = questions[currentIndex];
    document.getElementById('progressBar').style.width = `${((currentIndex+1)/50)*100}%`;
    document.getElementById('progressText').textContent = `Pregunta ${currentIndex+1} de 50`;
    
    let html = `<div class="question-text">${q.q}</div>`;
    q.shuffledOptions.forEach((opt, i) => {
        html += `<div class="option-label ${userAnswers[currentIndex] === i ? 'selected' : ''}" onclick="selectOpt(${i})">
            <input type="radio" name="examOpt" ${userAnswers[currentIndex] === i ? 'checked' : ''}>
            <span style="margin-left:12px">${opt}</span>
        </div>`;
    });
    document.getElementById('questionArea').innerHTML = html;
    document.getElementById('btnNext').textContent = (currentIndex === 49) ? "FINALIZAR" : "Siguiente";
}

function selectOpt(i) {
    userAnswers[currentIndex] = i;
    renderQuestion();
}

function nextQuestion() {
    if(userAnswers[currentIndex] === null) return alert("Seleccione una respuesta.");
    if(currentIndex < 49) {
        currentIndex++;
        renderQuestion();
    } else {
        if(confirm("¿Seguro que desea finalizar el examen?")) finishExam();
    }
}

function prevQuestion() {
    if(currentIndex > 0) { currentIndex--; renderQuestion(); }
}

async function finishExam() {
    clearInterval(timerInterval);
    let correctas = 0;
    questions.forEach((q, i) => { if(userAnswers[i] === q.c) correctas++; });
    
    // CÁLCULO DE 0 A 100
    const score = Math.round((correctas / 50) * 100);
    
    document.getElementById('view-exam').classList.add('hidden');
    document.getElementById('view-results').classList.remove('hidden');
    document.getElementById('resName').textContent = `${studentData.nombre} ${studentData.apellido}`;
    document.getElementById('resScore').textContent = score + "%";

    const record = { 
        ...studentData, 
        puntaje: score + "%", 
        correctas: correctas, 
        fecha: new Date().toLocaleString() 
    };

    // SINCRONIZAR CON GITHUB (ACUMULATIVO)
    const url = `https://api.github.com/repos/${GITHUB_CFG.repo}/contents/${GITHUB_CFG.path}`;
    try {
        const res = await fetch(url, { headers: { "Authorization": `token ${GITHUB_CFG.token}` } });
        let content = [], sha = "";
        if(res.ok) {
            const data = await res.json();
            sha = data.sha;
            content = JSON.parse(atob(data.content));
        }
        content.push(record);
        const update = await fetch(url, {
            method: "PUT",
            headers: { "Authorization": `token ${GITHUB_CFG.token}`, "Content-Type": "application/json" },
            body: JSON.stringify({ 
                message: `Resultado: ${record.nombre} - ${record.puntaje}`, 
                content: btoa(JSON.stringify(content, null, 2)), 
                sha: sha 
            })
        });
        if(update.ok) document.getElementById('syncStatus').innerHTML = "✅ Datos guardados en el servidor central.";
    } catch (e) {
        document.getElementById('syncStatus').innerHTML = "⚠️ Error al subir a GitHub. Use el botón de abajo para guardar su copia.";
    }

    // Guardar también localmente para el Excel
    let localHistory = JSON.parse(localStorage.getItem('aurora_history') || "[]");
    localHistory.unshift(record);
    localStorage.setItem('aurora_history', JSON.stringify(localHistory));
}

function exportToExcel() {
    const data = JSON.parse(localStorage.getItem('aurora_history') || "[]");
    const ws = XLSX.utils.json_to_sheet(data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Resultados");
    XLSX.writeFile(wb, `Reporte_Examen_${studentData.nombre}.xlsx`);
}

init();
</script>

</body>
</html>
